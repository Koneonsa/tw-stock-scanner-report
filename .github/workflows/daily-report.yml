name: Daily Taiwan Stock Report

on:
  push:
    branches: ["main"]
  schedule:
    # 20:30 Asia/Taipei = 12:30 UTC.
    - cron: "30 12 * * *"
  workflow_dispatch:
    inputs:
      notify_telegram:
        description: "Send Telegram notification after deploy"
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy-notify:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update data and build report
        run: |
          set +e
          python -m scanner.cli update --backfill --days 300 2>&1 | tee update.log
          update_status=${PIPESTATUS[0]}
          if [ "$update_status" -eq 0 ]; then
            python -m scanner.cli report 2>&1 | tee report.log
            report_status=${PIPESTATUS[0]}
          else
            report_status=0
          fi
          if [ "$update_status" -ne 0 ] || [ "$report_status" -ne 0 ]; then
            python - <<'PY'
          from html import escape
          from pathlib import Path
          logs = []
          for name in ("update.log", "report.log"):
              path = Path(name)
              if path.exists():
                  logs.append(f"===== {name} =====\n" + path.read_text(errors="replace"))
          body = escape("\n\n".join(logs) or "No logs captured.")
          Path("reports").mkdir(exist_ok=True)
          Path("reports/getmoneytommrrow.html").write_text(
              "<!doctype html><meta charset='utf-8'><title>Report build failed</title>"
              "<body style='font-family:-apple-system,BlinkMacSystemFont,sans-serif;padding:24px'>"
              "<h1>Report build failed</h1><p>GitHub Actions 產生報告時失敗，以下是公開除錯內容。</p>"
              f"<pre style='white-space:pre-wrap;background:#f5f5f7;padding:16px;border-radius:12px'>{body}</pre>"
              "</body>",
              encoding="utf-8",
          )
          PY
          fi

      - name: Prepare GitHub Pages site
        run: |
          mkdir -p public
          cp reports/getmoneytommrrow.html public/getmoneytommrrow.html
          cp reports/getmoneytommrrow.html public/index.html
          touch public/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Notify Telegram with report URL
        if: github.event_name == 'schedule' || inputs.notify_telegram == true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_REPORT_URL: ${{ steps.deployment.outputs.page_url }}getmoneytommrrow.html
        run: python -m scanner.cli notify-telegram
