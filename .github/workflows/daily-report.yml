name: Daily Taiwan Stock Report

on:
  schedule:
    # 20:30 Asia/Taipei = 12:30 UTC.
    - cron: "30 12 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy-notify:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update data and build report
        run: |
          python -m scanner.cli update --backfill --days 300
          python -m scanner.cli report

      - name: Prepare GitHub Pages site
        run: |
          mkdir -p public
          cp reports/latest.html public/latest.html
          cp reports/latest.html public/index.html
          touch public/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Notify Telegram with report URL
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_REPORT_URL: ${{ steps.deployment.outputs.page_url }}latest.html
        run: python -m scanner.cli notify-telegram
